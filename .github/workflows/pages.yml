name: Deploy landing to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "projects/landing/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Stage landing
        run: |
          mkdir -p _site
          cp -r projects/landing/* _site/
          # SPA-style 404 fallback to index
          cp projects/landing/index.html _site/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
