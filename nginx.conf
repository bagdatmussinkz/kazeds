events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Unified KazEDS host — sign.aitu.uz
    # /        → landing (static)
    # /app/    → Web App PWA (Next.js, basePath=/app)
    # /relay/  → Cloud Relay API (Node.js, port 3001)
    # /relay/verify/ → Java Verifier (port 8082)
    # /ext/    → Extension assets / widget CDN
    server {
        listen 80;
        server_name sign.aitu.uz eds.kazeds.local;

        # ---- Web App (PWA) — http://host.docker.internal:5173 mounted at /app ----
        # Both /app and /app/* must be proxied; otherwise Next.js basePath redirect
        # ("/app/" → "/app") loops with the landing `location /` block.
        location /app {
            proxy_pass http://host.docker.internal:5173;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ---- TSA proxy — браузер не может дёргать TSA напрямую (CORS) ----
        # Content-Type: application/timestamp-query триггерит preflight — отвечаем сами.
        location /relay/tsa/prod {
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin *;
                add_header Access-Control-Allow-Methods "POST, OPTIONS";
                add_header Access-Control-Allow-Headers "Content-Type";
                return 204;
            }
            proxy_pass http://tsp.pki.gov.kz/;
            proxy_set_header Host tsp.pki.gov.kz;
            add_header Access-Control-Allow-Origin * always;
        }
        location /relay/tsa/test {
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin *;
                add_header Access-Control-Allow-Methods "POST, OPTIONS";
                add_header Access-Control-Allow-Headers "Content-Type";
                return 204;
            }
            proxy_pass http://test.pki.gov.kz/tsp/;
            proxy_set_header Host test.pki.gov.kz;
            add_header Access-Control-Allow-Origin * always;
        }

        # ---- Cloud Relay API — http://host.docker.internal:3001 mounted at /relay ----
        # Java Verifier carved out before the generic /relay/ proxy
        location /relay/verify/ {
            proxy_pass http://host.docker.internal:8082/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /relay/ {
            proxy_pass http://host.docker.internal:3001/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ---- Extension assets / widget CDN ----
        location /ext/ {
            alias /var/www/extension/;
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, OPTIONS";
            add_header Cache-Control "public, max-age=300";
            types {
                application/x-chrome-extension crx;
                application/zip zip;
            }
            try_files $uri =404;
        }

        # ---- Landing (static) ----
        root /var/www/landing;
        index index.html;

        # brand.css must not be CDN-cached stale — revalidate every time
        location = /brand.css {
            add_header Cache-Control "no-cache, must-revalidate";
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }

    # Demo Site — demo.aitu.uz (separate test site)
    server {
        listen 80;
        server_name demo.aitu.uz demo.kazeds.local;

        location / {
            proxy_pass http://host.docker.internal:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # FamilyInfo — family.aitu.uz (unrelated service)
    server {
        listen 80;
        server_name family.aitu.uz;

        client_max_body_size 500M;

        location /api/ {
            proxy_pass http://host.docker.internal:3100/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_request_buffering off;
        }

        location / {
            proxy_pass http://host.docker.internal:3101;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
