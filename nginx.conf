events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Landing — sign.aitu.uz
    server {
        listen 80;
        server_name sign.aitu.uz eds.kazeds.local;

        root /var/www/landing;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }
    }

    # Demo Site — demo-sign.aitu.uz
    server {
        listen 80;
        server_name demo-sign.aitu.uz demo.kazeds.local;

        location / {
            proxy_pass http://host.docker.internal:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Web App (PWA) — app-sign.aitu.uz
    server {
        listen 80;
        server_name app-sign.aitu.uz app.kazeds.local;

        location / {
            proxy_pass http://host.docker.internal:5173;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Widget CDN — extension-sign.aitu.uz
    server {
        listen 80;
        server_name extension-sign.aitu.uz extension.kazeds.local;

        root /var/www/extension;

        # CORS — разрешаем любому сайту подключать виджет
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        add_header Cache-Control "public, max-age=300";

        location / {
            try_files $uri =404;
        }
    }

    # Aitu Mini App — miniapp-sign.aitu.uz
    server {
        listen 80;
        server_name miniapp-sign.aitu.uz miniapp.kazeds.local;

        root /var/www/miniapp;
        index index.html;

        add_header Access-Control-Allow-Origin *;

        location / {
            try_files $uri $uri/ /index.html;
        }
    }

# FamilyInfo — family.aitu.uz
    server {
        listen 80;
        server_name family.aitu.uz;

        client_max_body_size 500M;

        # /api/* → FamilyInfo API (strip /api prefix)
        location /api/ {
            proxy_pass http://host.docker.internal:3100/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_request_buffering off;
        }

        # /* → FamilyInfo Web (Next.js)
        location / {
            proxy_pass http://host.docker.internal:3101;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

# Cloud Relay — relay-sign.aitu.uz
    server {
        listen 80;
        server_name relay-sign.aitu.uz relay.kazeds.local;

        # /verify/* → Java Verifier (BouncyCastle)
        location /verify/ {
            proxy_pass http://host.docker.internal:8082/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Everything else → Node.js Relay
        location / {
            proxy_pass http://host.docker.internal:3001;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
