events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Landing — sign.aitu.uz
    server {
        listen 80;
        server_name sign.aitu.uz eds.kazeds.local;

        root /var/www/landing;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }
    }

    # Demo Site — demo.sign.aitu.uz
    server {
        listen 80;
        server_name demo.sign.aitu.uz demo.kazeds.local;

        location / {
            proxy_pass http://host.docker.internal:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Web App (PWA) — app.sign.aitu.uz
    server {
        listen 80;
        server_name app.sign.aitu.uz app.kazeds.local;

        location / {
            proxy_pass http://host.docker.internal:5173;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Widget CDN — extension.sign.aitu.uz
    server {
        listen 80;
        server_name extension.sign.aitu.uz extension.kazeds.local;

        root /var/www/extension;

        # CORS — разрешаем любому сайту подключать виджет
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        add_header Cache-Control "public, max-age=300";

        location / {
            try_files $uri =404;
        }
    }

    # Cloud Relay — relay.sign.aitu.uz
    server {
        listen 80;
        server_name relay.sign.aitu.uz relay.kazeds.local;

        location / {
            proxy_pass http://host.docker.internal:3001;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
