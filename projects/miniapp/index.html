<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1F4E79">
  <title>KazEDS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { -webkit-tap-highlight-color: transparent; }
    body { overscroll-behavior: none; }
    .page { display: none; min-height: 100vh; }
    .page.active { display: flex; }
    .tab-bar { padding-bottom: env(safe-area-inset-bottom, 8px); }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased">

  <!-- ==================== Tab Bar ==================== -->
  <nav class="tab-bar fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 z-40">
    <div class="flex justify-around py-2">
      <button onclick="showPage('scan')" id="tab-scan" class="tab flex flex-col items-center gap-0.5 text-[10px] text-slate-400 transition">
        <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 4.875c0-.621.504-1.125 1.125-1.125h4.5c.621 0 1.125.504 1.125 1.125v4.5c0 .621-.504 1.125-1.125 1.125h-4.5A1.125 1.125 0 013.75 9.375v-4.5zM3.75 14.625c0-.621.504-1.125 1.125-1.125h4.5c.621 0 1.125.504 1.125 1.125v4.5c0 .621-.504 1.125-1.125 1.125h-4.5a1.125 1.125 0 01-1.125-1.125v-4.5zM13.5 4.875c0-.621.504-1.125 1.125-1.125h4.5c.621 0 1.125.504 1.125 1.125v4.5c0 .621-.504 1.125-1.125 1.125h-4.5A1.125 1.125 0 0113.5 9.375v-4.5z" />
          <path stroke-linecap="round" stroke-linejoin="round" d="M6.75 6.75h.75v.75h-.75v-.75zM6.75 16.5h.75v.75h-.75v-.75zM16.5 6.75h.75v.75H16.5v-.75zM13.5 13.5h.75v.75h-.75v-.75zM13.5 19.5h.75v.75h-.75v-.75zM19.5 13.5h.75v.75h-.75v-.75zM19.5 19.5h.75v.75h-.75v-.75zM16.5 16.5h.75v.75H16.5v-.75z" />
        </svg>
        <span>Сканер</span>
      </button>
      <button onclick="showPage('history')" id="tab-history" class="tab flex flex-col items-center gap-0.5 text-[10px] text-slate-400 transition">
        <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        <span>История</span>
      </button>
      <button onclick="showPage('profile')" id="tab-profile" class="tab flex flex-col items-center gap-0.5 text-[10px] text-slate-400 transition">
        <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" />
        </svg>
        <span>Профиль</span>
      </button>
    </div>
  </nav>

  <!-- ==================== Scan Page ==================== -->
  <div id="page-scan" class="page active flex-col items-center px-4 pt-6 pb-24">
    <div class="w-full max-w-sm">
      <!-- Header -->
      <div class="flex items-center gap-3 mb-6">
        <div class="w-10 h-10 bg-[#1F4E79] rounded-xl flex items-center justify-center">
          <span class="text-white font-bold text-lg">K</span>
        </div>
        <div>
          <h1 class="text-lg font-bold text-slate-800">KazEDS</h1>
          <p class="text-xs text-slate-400">Мобильная ЭЦП</p>
        </div>
      </div>

      <!-- Scanner area -->
      <div id="scanner-area" class="bg-white rounded-2xl border border-slate-200 p-4 mb-4">
        <div id="scanner-placeholder" class="flex flex-col items-center py-8">
          <div class="w-16 h-16 bg-slate-100 rounded-2xl flex items-center justify-center mb-3">
            <svg class="w-8 h-8 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6.827 6.175A2.31 2.31 0 015.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 00-1.134-.175 2.31 2.31 0 01-1.64-1.055l-.822-1.316a2.192 2.192 0 00-1.736-1.039 48.774 48.774 0 00-5.232 0 2.192 2.192 0 00-1.736 1.039l-.821 1.316z" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 12.75a4.5 4.5 0 11-9 0 4.5 4.5 0 019 0z" />
            </svg>
          </div>
          <p class="text-slate-600 font-medium text-sm mb-1">QR-сканер</p>
          <p class="text-slate-400 text-xs text-center mb-4">Наведите камеру на QR-код для подписания</p>
          <button onclick="startScanner()" class="px-6 py-2.5 bg-[#1F4E79] text-white text-sm font-medium rounded-xl hover:bg-[#163d5e] active:scale-95 transition shadow-sm">
            Открыть камеру
          </button>
        </div>
        <div id="scanner-viewfinder" class="hidden">
          <div id="qr-reader" class="w-full aspect-square rounded-xl overflow-hidden bg-black"></div>
          <button onclick="stopScanner()" class="w-full mt-3 py-2 text-slate-500 text-sm rounded-lg hover:bg-slate-50 transition">
            Закрыть камеру
          </button>
        </div>
      </div>

      <!-- Quick info -->
      <div id="cert-quick" class="hidden bg-emerald-50 border border-emerald-200 rounded-xl p-3 mb-4">
        <div class="flex items-center gap-2">
          <svg class="w-4 h-4 text-emerald-600 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" /></svg>
          <span id="cert-quick-name" class="text-emerald-700 text-sm font-medium truncate"></span>
        </div>
      </div>

      <!-- Upload key -->
      <button onclick="document.getElementById('p12-input').click()" id="btn-upload-key"
        class="w-full flex items-center gap-3 p-3 bg-white border border-slate-200 rounded-xl hover:bg-slate-50 active:scale-[0.98] transition">
        <div class="w-9 h-9 bg-slate-100 rounded-lg flex items-center justify-center flex-shrink-0">
          <svg class="w-5 h-5 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 5.25a3 3 0 013 3m3 0a6 6 0 01-7.029 5.912c-.563-.097-1.159.026-1.563.43L10.5 17.25H8.25v2.25H6v2.25H2.25v-2.818c0-.597.237-1.17.659-1.591l6.499-6.499c.404-.404.527-1 .43-1.563A6 6 0 1121.75 8.25z" />
          </svg>
        </div>
        <div class="text-left">
          <span class="text-sm font-medium text-slate-700 block">Загрузить ЭЦП (.p12)</span>
          <span class="text-xs text-slate-400">Для подписания ГОСТ</span>
        </div>
      </button>
      <input type="file" id="p12-input" accept=".p12,.pfx" class="hidden" onchange="handleP12Upload(this)">
    </div>
  </div>

  <!-- ==================== History Page ==================== -->
  <div id="page-history" class="page flex-col px-4 pt-6 pb-24">
    <div class="w-full max-w-sm mx-auto">
      <h1 class="text-lg font-bold text-slate-800 mb-4">История подписаний</h1>
      <div id="history-list" class="space-y-2">
        <div class="text-center py-12">
          <div class="w-14 h-14 bg-slate-100 rounded-full flex items-center justify-center mx-auto mb-3">
            <svg class="w-7 h-7 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
          </div>
          <p class="text-slate-400 text-sm">Нет операций</p>
          <p class="text-slate-300 text-xs">Подписания будут отображаться здесь</p>
        </div>
      </div>
    </div>
  </div>

  <!-- ==================== Profile Page ==================== -->
  <div id="page-profile" class="page flex-col px-4 pt-6 pb-24">
    <div class="w-full max-w-sm mx-auto">
      <h1 class="text-lg font-bold text-slate-800 mb-4">Профиль</h1>

      <div id="profile-no-cert" class="text-center py-12">
        <div class="w-14 h-14 bg-slate-100 rounded-full flex items-center justify-center mx-auto mb-3">
          <svg class="w-7 h-7 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" />
          </svg>
        </div>
        <p class="text-slate-400 text-sm">Сертификат не загружен</p>
        <button onclick="showPage('scan')" class="mt-3 px-4 py-2 text-[#1F4E79] text-sm font-medium underline">
          Загрузить ЭЦП
        </button>
      </div>

      <div id="profile-cert" class="hidden">
        <div class="bg-white rounded-2xl border border-slate-200 p-4 space-y-3">
          <div class="flex items-center gap-3 mb-2">
            <div class="w-12 h-12 bg-[#1F4E79] rounded-xl flex items-center justify-center">
              <svg class="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" />
              </svg>
            </div>
            <div class="min-w-0">
              <p id="profile-name" class="font-semibold text-slate-800 truncate"></p>
              <p id="profile-type" class="text-xs text-[#1F4E79]"></p>
            </div>
          </div>
          <div class="border-t border-slate-100"></div>
          <div class="space-y-2 text-sm">
            <div class="flex justify-between">
              <span class="text-slate-400">ИИН/БИН</span>
              <span id="profile-iin" class="text-slate-700 font-mono"></span>
            </div>
            <div class="flex justify-between">
              <span class="text-slate-400">Издатель</span>
              <span id="profile-issuer" class="text-slate-700 text-right text-xs max-w-[60%] truncate"></span>
            </div>
            <div class="flex justify-between">
              <span class="text-slate-400">Действует до</span>
              <span id="profile-expires" class="text-slate-700"></span>
            </div>
            <div class="flex justify-between">
              <span class="text-slate-400">Алгоритм</span>
              <span id="profile-algo" class="text-slate-700 font-mono text-xs"></span>
            </div>
          </div>
        </div>
        <button onclick="removeCert()"
          class="w-full mt-4 py-2.5 text-red-500 text-sm font-medium border border-red-200 rounded-xl hover:bg-red-50 transition">
          Удалить сертификат
        </button>
      </div>

      <p class="text-center text-slate-300 text-xs mt-8">KazEDS Mini App v1.0</p>
    </div>
  </div>

  <!-- ==================== Signing Modal ==================== -->
  <div id="sign-modal" class="fixed inset-0 z-50 hidden">
    <div class="absolute inset-0 bg-black/50 backdrop-blur-sm" onclick="closeSignModal()"></div>
    <div class="absolute bottom-0 left-0 right-0 bg-white rounded-t-2xl p-6 pb-8 shadow-2xl transform transition-transform" id="sign-modal-sheet">
      <div class="w-10 h-1 bg-slate-200 rounded-full mx-auto mb-4"></div>
      <div id="sign-modal-content"></div>
    </div>
  </div>

  <script>
    // ============ State ============
    let currentPage = "scan";
    let scanner = null;
    let certInfo = null; // {name, type, iin, issuer, expires, algo}
    let p12Data = null;  // {base64, password}
    let history = JSON.parse(localStorage.getItem("kazeds_history") || "[]");

    // ============ Navigation ============
    function showPage(name) {
      document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
      document.getElementById("page-" + name).classList.add("active");
      document.querySelectorAll(".tab").forEach(t => {
        t.classList.remove("text-[#1F4E79]");
        t.classList.add("text-slate-400");
      });
      document.getElementById("tab-" + name).classList.remove("text-slate-400");
      document.getElementById("tab-" + name).classList.add("text-[#1F4E79]");
      currentPage = name;
      if (name === "history") renderHistory();
      if (name === "profile") renderProfile();
    }

    // ============ QR Scanner ============
    async function startScanner() {
      document.getElementById("scanner-placeholder").classList.add("hidden");
      document.getElementById("scanner-viewfinder").classList.remove("hidden");
      try {
        const { Html5Qrcode } = await import("https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js");
        scanner = new Html5Qrcode("qr-reader");
        await scanner.start(
          { facingMode: "environment" },
          { fps: 10, qrbox: { width: 220, height: 220 } },
          (text) => { stopScanner(); handleQR(text); },
          () => {}
        );
      } catch (e) {
        // Fallback: try dynamic import
        try {
          const mod = await import("/node_modules/html5-qrcode/esm/index.js");
          scanner = new mod.Html5Qrcode("qr-reader");
          await scanner.start(
            { facingMode: "environment" },
            { fps: 10, qrbox: { width: 220, height: 220 } },
            (text) => { stopScanner(); handleQR(text); },
            () => {}
          );
        } catch (e2) {
          alert("Не удалось открыть камеру: " + e2.message);
          stopScanner();
        }
      }
    }

    function stopScanner() {
      if (scanner) { scanner.stop().catch(() => {}); scanner = null; }
      document.getElementById("scanner-placeholder").classList.remove("hidden");
      document.getElementById("scanner-viewfinder").classList.add("hidden");
    }

    function handleQR(text) {
      // Deep link: sign.aitu.uz/app/#/sign?...
      const hashIdx = text.indexOf("#/sign");
      if (hashIdx !== -1) {
        const params = new URLSearchParams(text.slice(text.indexOf("?", hashIdx) + 1));
        showSignModal({
          session: params.get("session"),
          challenge: params.get("challenge"),
          origin: params.get("origin"),
          callback: params.get("callback"),
          data: params.get("data"),
          op: params.get("op") || "sign",
        });
        return;
      }
      // mobileSign: prefix (eGov)
      if (text.startsWith("mobileSign:")) {
        showSignModal({ egovUrl: text.slice("mobileSign:".length) });
        return;
      }
      alert("QR-код не содержит запроса на подписание");
    }

    // ============ Signing Modal ============
    function showSignModal(params) {
      const modal = document.getElementById("sign-modal");
      const content = document.getElementById("sign-modal-content");
      const decodedData = params.data ? tryDecode(params.data) : null;
      const opLabel = params.op === "auth" ? "Аутентификация" : "Подписание";

      content.innerHTML = `
        <div class="text-center mb-4">
          <div class="w-12 h-12 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-2">
            <svg class="w-6 h-6 text-[#1F4E79]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
            </svg>
          </div>
          <h2 class="text-lg font-bold text-slate-800">${opLabel}</h2>
        </div>
        <div class="bg-slate-50 rounded-xl p-3 space-y-2 text-sm mb-4">
          ${params.origin ? `<div class="flex justify-between"><span class="text-slate-400 text-xs">Источник</span><span class="text-slate-700 text-xs break-all">${params.origin}</span></div>` : ""}
          ${decodedData ? `<div class="flex justify-between"><span class="text-slate-400 text-xs">Данные</span><span class="text-slate-700 font-mono text-xs font-semibold">"${decodedData}"</span></div>` : ""}
        </div>
        <button onclick="doSign(${JSON.stringify(params).replace(/"/g, '&quot;')})"
          class="w-full py-3.5 bg-[#1F4E79] text-white font-semibold rounded-xl active:scale-95 transition shadow-md">
          Подписать
        </button>
        <button onclick="closeSignModal()"
          class="w-full mt-2 py-2.5 text-slate-400 text-sm rounded-xl">
          Отмена
        </button>
      `;
      modal.classList.remove("hidden");
    }

    async function doSign(params) {
      const content = document.getElementById("sign-modal-content");
      content.innerHTML = `
        <div class="flex flex-col items-center py-6">
          <div class="w-8 h-8 border-2 border-[#1F4E79] border-t-transparent rounded-full animate-spin mb-3"></div>
          <p class="text-slate-500 text-sm">Подписание...</p>
        </div>
      `;

      try {
        // Generate ECDSA key & sign
        const keyPair = await crypto.subtle.generateKey({ name: "ECDSA", namedCurve: "P-256" }, true, ["sign", "verify"]);
        const pubDer = await crypto.subtle.exportKey("spki", keyPair.publicKey);
        const dataToSign = params.data || params.challenge || "";
        const dataBytes = Uint8Array.from(atob(dataToSign), c => c.charCodeAt(0));
        const sigBuf = await crypto.subtle.sign({ name: "ECDSA", hash: "SHA-256" }, keyPair.privateKey, dataBytes);

        const cert = btoa(String.fromCharCode(...new Uint8Array(pubDer)));
        const sig = btoa(String.fromCharCode(...new Uint8Array(sigBuf)));

        // POST to callback
        if (params.callback) {
          await fetch(params.callback, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ certificate: cert, signature: sig, algorithm: "SHA256withECDSA" }),
          });
        }

        // Save to history
        const entry = {
          ts: Date.now(),
          origin: params.origin || "unknown",
          op: params.op || "sign",
          data: params.data ? tryDecode(params.data) : null,
        };
        history.unshift(entry);
        if (history.length > 50) history = history.slice(0, 50);
        localStorage.setItem("kazeds_history", JSON.stringify(history));

        content.innerHTML = `
          <div class="flex flex-col items-center py-4">
            <div class="w-14 h-14 bg-emerald-100 rounded-full flex items-center justify-center mb-3">
              <svg class="w-7 h-7 text-emerald-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" /></svg>
            </div>
            <p class="text-emerald-700 font-bold text-lg mb-1">Подписано</p>
            <p class="text-slate-400 text-xs mb-4">Результат отправлен</p>
            <button onclick="closeSignModal()" class="px-6 py-2 bg-slate-100 text-slate-600 text-sm rounded-xl">Закрыть</button>
          </div>
        `;
      } catch (err) {
        content.innerHTML = `
          <div class="flex flex-col items-center py-4">
            <div class="w-14 h-14 bg-red-100 rounded-full flex items-center justify-center mb-3">
              <svg class="w-7 h-7 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
            </div>
            <p class="text-red-600 font-bold mb-1">Ошибка</p>
            <p class="text-slate-400 text-xs mb-4">${err.message || "Неизвестная ошибка"}</p>
            <button onclick="closeSignModal()" class="px-6 py-2 bg-slate-100 text-slate-600 text-sm rounded-xl">Закрыть</button>
          </div>
        `;
      }
    }

    function closeSignModal() {
      document.getElementById("sign-modal").classList.add("hidden");
      document.getElementById("sign-modal-content").innerHTML = "";
      if (window.location.hash.startsWith("#/sign")) {
        window.history.replaceState(null, "", window.location.pathname + window.location.search);
      }
    }

    // ============ History ============
    function renderHistory() {
      const list = document.getElementById("history-list");
      if (history.length === 0) {
        list.innerHTML = `
          <div class="text-center py-12">
            <div class="w-14 h-14 bg-slate-100 rounded-full flex items-center justify-center mx-auto mb-3">
              <svg class="w-7 h-7 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
            </div>
            <p class="text-slate-400 text-sm">Нет операций</p>
          </div>`;
        return;
      }
      list.innerHTML = history.map(h => `
        <div class="bg-white rounded-xl border border-slate-200 p-3 flex items-center gap-3">
          <div class="w-9 h-9 ${h.op === "auth" ? "bg-blue-50" : "bg-amber-50"} rounded-lg flex items-center justify-center flex-shrink-0">
            <svg class="w-4 h-4 ${h.op === "auth" ? "text-blue-600" : "text-amber-600"}" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" /></svg>
          </div>
          <div class="min-w-0 flex-1">
            <p class="text-sm font-medium text-slate-700 truncate">${h.origin}</p>
            <p class="text-xs text-slate-400">${new Date(h.ts).toLocaleString("ru-KZ")}${h.data ? ' — "' + h.data + '"' : ''}</p>
          </div>
        </div>
      `).join("");
    }

    // ============ Profile ============
    function renderProfile() {
      const info = JSON.parse(localStorage.getItem("kazeds_keyinfo") || "null");
      if (info) {
        certInfo = info;
        document.getElementById("profile-no-cert").classList.add("hidden");
        document.getElementById("profile-cert").classList.remove("hidden");
        document.getElementById("profile-name").textContent = info.name || "Сертификат";
        document.getElementById("profile-type").textContent = info.type || "ECDSA";
        document.getElementById("profile-iin").textContent = info.iin || "—";
        document.getElementById("profile-issuer").textContent = info.issuer || "—";
        document.getElementById("profile-expires").textContent = info.expires || "—";
        document.getElementById("profile-algo").textContent = info.type || "ECDSA P-256";
      } else {
        document.getElementById("profile-no-cert").classList.remove("hidden");
        document.getElementById("profile-cert").classList.add("hidden");
      }
    }

    function removeCert() {
      if (!confirm("Удалить сертификат?")) return;
      localStorage.removeItem("kazeds_p12");
      localStorage.removeItem("kazeds_p12_password");
      localStorage.removeItem("kazeds_keyinfo");
      certInfo = null;
      document.getElementById("cert-quick").classList.add("hidden");
      renderProfile();
    }

    // ============ P12 Upload ============
    async function handleP12Upload(input) {
      const file = input.files[0];
      if (!file) return;
      const password = prompt("Пароль от ЭЦП:");
      if (!password) return;
      const buf = await file.arrayBuffer();
      const base64 = btoa(new Uint8Array(buf).reduce((s, b) => s + String.fromCharCode(b), ""));
      const info = { name: file.name, type: "GOST", iin: "—", issuer: "—", expires: "—" };

      localStorage.setItem("kazeds_p12", base64);
      localStorage.setItem("kazeds_p12_password", password);
      localStorage.setItem("kazeds_keyinfo", JSON.stringify(info));

      document.getElementById("cert-quick").classList.remove("hidden");
      document.getElementById("cert-quick-name").textContent = file.name;
      input.value = "";
    }

    // ============ Helpers ============
    function tryDecode(b64) {
      try { return new TextDecoder("utf-8", { fatal: true }).decode(Uint8Array.from(atob(b64), c => c.charCodeAt(0))); }
      catch { return null; }
    }

    // ============ Init ============
    const info = JSON.parse(localStorage.getItem("kazeds_keyinfo") || "null");
    if (info) {
      document.getElementById("cert-quick").classList.remove("hidden");
      document.getElementById("cert-quick-name").textContent = info.name;
    }

    // Handle deep link from QR
    if (window.location.hash.startsWith("#/sign")) {
      const q = new URLSearchParams(window.location.hash.slice(window.location.hash.indexOf("?") + 1));
      showSignModal({
        session: q.get("session"), challenge: q.get("challenge"),
        origin: q.get("origin"), callback: q.get("callback"),
        data: q.get("data"), op: q.get("op") || "sign",
      });
    }
  </script>
</body>
</html>
